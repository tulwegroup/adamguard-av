# AdamGuard - Complete Fix for 504 Error
# Creates proper ECS Service with ALB integration

name: Complete Fix 504

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: adamguard-pro

jobs:
  complete-fix:
    name: Complete Fix for 504 Gateway Timeout
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Step 1 - Diagnostic Overview
        run: |
          echo "=========================================="
          echo "🔍 DIAGNOSTIC OVERVIEW"
          echo "=========================================="
          
          echo ""
          echo "=== LOAD BALANCERS ==="
          aws elbv2 describe-load-balancers --query "LoadBalancers[*].[LoadBalancerName,DNSName,State.Code]" --output table
          
          echo ""
          echo "=== TARGET GROUPS ==="
          aws elbv2 describe-target-groups --query "TargetGroups[*].[TargetGroupName,TargetGroupArn,Protocol,Port]" --output table
          
          echo ""
          echo "=== ECS CLUSTERS ==="
          aws ecs list-clusters --query "clusterArns" --output table
          
          echo ""
          echo "=== ECS SERVICES ==="
          for cluster in $(aws ecs list-clusters --query "clusterArns[*]" --output text); do
            cluster_name=$(echo $cluster | rev | cut -d'/' -f1 | rev)
            echo "Cluster: $cluster_name"
            aws ecs list-services --cluster $cluster_name --query "serviceArns" --output table 2>/dev/null || echo "No services"
          done
          
          echo ""
          echo "=== ECS TASKS ==="
          for cluster in $(aws ecs list-clusters --query "clusterArns[*]" --output text); do
            cluster_name=$(echo $cluster | rev | cut -d'/' -f1 | rev)
            tasks=$(aws ecs list-tasks --cluster $cluster_name --query "taskArns" --output text 2>/dev/null)
            if [ -n "$tasks" ]; then
              echo "Cluster: $cluster_name"
              aws ecs describe-tasks --cluster $cluster_name --tasks $tasks --query "tasks[*].[taskArn,lastStatus,containers[0].name]" --output table 2>/dev/null || true
            fi
          done

      - name: Step 2 - Get VPC and Subnets
        id: network
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
          
          echo "VPC: $VPC_ID"
          
          # Get ALL subnets in VPC
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query "Subnets[*].SubnetId" --output text)
          SUBNET_ARRAY=($SUBNETS)
          
          # Get subnets with routes to IGW (public subnets)
          PUBLIC_SUBNETS=""
          for subnet in "${SUBNET_ARRAY[@]}"; do
            RT_ASSOC=$(aws ec2 describe-route-tables --filters "Name=association.subnet-id,Values=$subnet" --query "RouteTables[0].Routes[?GatewayId!='local'].GatewayId" --output text 2>/dev/null || echo "")
            if [[ "$RT_ASSOC" == *"igw-"* ]]; then
              if [ -z "$PUBLIC_SUBNETS" ]; then
                PUBLIC_SUBNETS="$subnet"
              else
                PUBLIC_SUBNETS="$PUBLIC_SUBNETS,$subnet"
              fi
            fi
          done
          
          # If no public subnets found, use all subnets
          if [ -z "$PUBLIC_SUBNETS" ]; then
            PUBLIC_SUBNETS="${SUBNET_ARRAY[0]},${SUBNET_ARRAY[1]:-${SUBNET_ARRAY[0]}}"
          fi
          
          echo "Public Subnets: $PUBLIC_SUBNETS"
          
          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
          echo "subnets=$PUBLIC_SUBNETS" >> $GITHUB_OUTPUT

      - name: Step 3 - Create/Update Security Group
        id: sg
        run: |
          VPC_ID="${{ steps.network.outputs.vpc_id }}"
          
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=adamguard-sg" "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "None")
          
          if [ "$SG_ID" = "None" ]; then
            echo "Creating security group..."
            SG_ID=$(aws ec2 create-security-group --group-name adamguard-sg --description "AdamGuard Security Group" --vpc-id $VPC_ID --query "GroupId" --output text)
            sleep 3
          fi
          
          echo "Security Group: $SG_ID"
          
          # Add inbound rules
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 80 --cidr 0.0.0.0/0 2>/dev/null || true
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 443 --cidr 0.0.0.0/0 2>/dev/null || true
          aws ec2 authorize-security-group-ingress --group-id $SG_ID --protocol tcp --port 3000 --cidr 0.0.0.0/0 2>/dev/null || true
          
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT

      - name: Step 4 - Create Target Group
        id: tg
        run: |
          VPC_ID="${{ steps.network.outputs.vpc_id }}"
          
          # Delete old target groups if they exist
          OLD_TGS=$(aws elbv2 describe-target-groups --query "TargetGroups[?contains(TargetGroupName, 'adamguard')].TargetGroupArn" --output text 2>/dev/null || echo "")
          
          for tg in $OLD_TGS; do
            if [ -n "$tg" ] && [ "$tg" != "None" ]; then
              echo "Deleting old target group: $tg"
              aws elbv2 delete-target-group --target-group-arn $tg 2>/dev/null || true
              sleep 2
            fi
          done
          
          echo "Creating new target group..."
          
          TG_ARN=$(aws elbv2 create-target-group \
            --name adamguard-tg-v2 \
            --protocol HTTP \
            --port 3000 \
            --vpc-id $VPC_ID \
            --target-type ip \
            --health-check-path "/" \
            --health-check-interval-seconds 30 \
            --health-check-timeout-seconds 10 \
            --healthy-threshold-count 2 \
            --unhealthy-threshold-count 5 \
            --query "TargetGroups[0].TargetGroupArn" \
            --output text)
          
          echo "Target Group ARN: $TG_ARN"
          
          echo "tg_arn=$TG_ARN" >> $GITHUB_OUTPUT

      - name: Step 5 - Create/Update ALB
        id: alb
        run: |
          VPC_ID="${{ steps.network.outputs.vpc_id }}"
          SUBNETS="${{ steps.network.outputs.subnets }}"
          SG_ID="${{ steps.sg.outputs.sg_id }}"
          
          IFS=',' read -ra SUBNET_ARRAY <<< "$SUBNETS"
          SUBNET_1=${SUBNET_ARRAY[0]}
          SUBNET_2=${SUBNET_ARRAY[1]:-${SUBNET_ARRAY[0]}}
          
          # Check for existing ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --names adamguard-alb-v2 --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "None")
          
          if [ "$ALB_ARN" = "None" ]; then
            echo "Creating new ALB..."
            
            ALB_ARN=$(aws elbv2 create-load-balancer \
              --name adamguard-alb-v2 \
              --subnets $SUBNET_1 $SUBNET_2 \
              --security-groups $SG_ID \
              --scheme internet-facing \
              --type application \
              --ip-address-type ipv4 \
              --query "LoadBalancers[0].LoadBalancerArn" \
              --output text)
            
            echo "Waiting for ALB to become active..."
            aws elbv2 wait load-balancer-available --load-balancer-arns $ALB_ARN
          fi
          
          ALB_DNS=$(aws elbv2 describe-load-balancers --load-balancer-arns $ALB_ARN --query "LoadBalancers[0].DNSName" --output text)
          
          echo "ALB ARN: $ALB_ARN"
          echo "ALB DNS: $ALB_DNS"
          
          echo "alb_arn=$ALB_ARN" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Step 6 - Create Listener
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          
          # Delete existing listeners
          LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn $ALB_ARN --query "Listeners[*].ListenerArn" --output text 2>/dev/null || echo "")
          
          for listener in $LISTENERS; do
            if [ -n "$listener" ] && [ "$listener" != "None" ]; then
              echo "Deleting listener: $listener"
              aws elbv2 delete-listener --listener-arn $listener || true
            fi
          done
          
          sleep 2
          
          echo "Creating HTTP listener..."
          aws elbv2 create-listener \
            --load-balancer-arn $ALB_ARN \
            --protocol HTTP \
            --port 80 \
            --default-actions Type=forward,TargetGroupArn=$TG_ARN
          
          echo "Listener created!"

      - name: Step 7 - Setup ECS Cluster
        run: |
          CLUSTER="adamguard-prod"
          
          aws ecs create-cluster --cluster-name $CLUSTER --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Cluster exists"
          
          echo "Cluster: $CLUSTER"

      - name: Step 8 - Create IAM Role
        run: |
          # Check if role exists
          if ! aws iam get-role --role-name ecsTaskExecutionRole 2>/dev/null; then
            echo "Creating IAM role..."
            
            cat > /tmp/trust.json << 'EOF'
{
  "Version": "2012-10-17",
  "Statement": [
    {
      "Effect": "Allow",
      "Principal": {
        "Service": "ecs-tasks.amazonaws.com"
      },
      "Action": "sts:AssumeRole"
    }
  ]
}
EOF
            
            aws iam create-role --role-name ecsTaskExecutionRole --assume-role-policy-document file:///tmp/trust.json || true
            sleep 5
          fi
          
          # Attach policy
          aws iam attach-role-policy --role-name ecsTaskExecutionRole --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
          
          echo "IAM role ready"

      - name: Step 9 - Register Task Definition
        run: |
          ECR_REGISTRY="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com"
          
          cat > /tmp/task.json << EOF
{
  "family": "adamguard-task-v2",
  "networkMode": "awsvpc",
  "requiresCompatibilities": ["FARGATE"],
  "cpu": "512",
  "memory": "1024",
  "executionRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
  "taskRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
  "containerDefinitions": [
    {
      "name": "adamguard-app",
      "image": "$ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest",
      "essential": true,
      "portMappings": [
        {
          "containerPort": 3000,
          "protocol": "tcp"
        }
      ],
      "environment": [
        {"name": "NODE_ENV", "value": "production"},
        {"name": "PORT", "value": "3000"},
        {"name": "HOSTNAME", "value": "0.0.0.0"}
      ],
      "logConfiguration": {
        "logDriver": "awslogs",
        "options": {
          "awslogs-group": "/ecs/adamguard",
          "awslogs-region": "${{ env.AWS_REGION }}",
          "awslogs-stream-prefix": "ecs"
        }
      },
      "healthCheck": {
        "command": ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"],
        "interval": 30,
        "timeout": 10,
        "retries": 3,
        "startPeriod": 120
      }
    }
  ]
}
EOF
          
          aws ecs register-task-definition --cli-input-json file:///tmp/task.json --region ${{ env.AWS_REGION }}
          
          echo "Task definition registered"

      - name: Step 10 - Create CloudWatch Log Group
        run: |
          aws logs create-log-group --log-group-name /ecs/adamguard --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Log group exists"

      - name: Step 11 - Delete Old Services
        run: |
          CLUSTER="adamguard-prod"
          
          SERVICES=$(aws ecs list-services --cluster $CLUSTER --query "serviceArns[*]" --output text 2>/dev/null || echo "")
          
          for service in $SERVICES; do
            if [ -n "$service" ] && [ "$service" != "None" ]; then
              service_name=$(echo $service | rev | cut -d'/' -f1 | rev)
              echo "Deleting service: $service_name"
              aws ecs delete-service --cluster $CLUSTER --service $service_name --force --region ${{ env.AWS_REGION }} 2>/dev/null || true
            fi
          done
          
          echo "Waiting for services to delete..."
          sleep 10

      - name: Step 12 - Create ECS Service with ALB
        run: |
          CLUSTER="adamguard-prod"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          SUBNETS="${{ steps.network.outputs.subnets }}"
          SG_ID="${{ steps.sg.outputs.sg_id }}"
          
          IFS=',' read -ra SUBNET_ARRAY <<< "$SUBNETS"
          SUBNET_1=${SUBNET_ARRAY[0]}
          SUBNET_2=${SUBNET_ARRAY[1]:-${SUBNET_ARRAY[0]}}
          
          echo "Creating ECS Service with ALB target group..."
          
          SERVICE_ARN=$(aws ecs create-service \
            --cluster $CLUSTER \
            --service-name adamguard-service \
            --task-definition adamguard-task-v2 \
            --desired-count 2 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUBNET_1,$SUBNET_2],securityGroups=[$SG_ID],assignPublicIp=ENABLED}" \
            --load-balancers "targetGroupArn=$TG_ARN,containerName=adamguard-app,containerPort=3000" \
            --query "service.serviceArn" \
            --output text \
            --region ${{ env.AWS_REGION }})
          
          echo "Service created: $SERVICE_ARN"
          echo ""
          echo "Waiting 2 minutes for tasks to start..."
          sleep 120

      - name: Step 13 - Check Service Status
        run: |
          CLUSTER="adamguard-prod"
          
          echo "=========================================="
          echo "🔍 SERVICE STATUS"
          echo "=========================================="
          
          aws ecs describe-services --cluster $CLUSTER --services adamguard-service --query "services[0].[status,runningCount,desiredCount,deployments[0].status]" --output table
          
          echo ""
          echo "=== TASKS ==="
          TASKS=$(aws ecs list-tasks --cluster $CLUSTER --service adamguard-service --query "taskArns[*]" --output text 2>/dev/null || echo "")
          
          if [ -n "$TASKS" ]; then
            aws ecs describe-tasks --cluster $CLUSTER --tasks $TASKS --query "tasks[*].[lastStatus,containers[0].lastStatus,containers[0].healthStatus]" --output table
          fi

      - name: Step 14 - Update Route 53
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          
          echo "=========================================="
          echo "🌐 UPDATING ROUTE 53"
          echo "=========================================="
          
          # Get hosted zone
          ZONE_ID=$(aws route53 list-hosted-zones --query "HostedZones[?contains(Name, 'deeptech-ai.co.uk')].Id" --output text | head -1)
          
          if [ -n "$ZONE_ID" ] && [ "$ZONE_ID" != "None" ]; then
            ZONE_ID=$(echo $ZONE_ID | sed 's|/hostedzone/||')
            
            echo "Zone ID: $ZONE_ID"
            echo "ALB DNS: $ALB_DNS"
            
            # Get ALB hosted zone
            ALB_ZONE_ID=$(aws elbv2 describe-load-balancers --load-balancer-arns "${{ steps.alb.outputs.alb_arn }}" --query "LoadBalancers[0].CanonicalHostedZoneId" --output text)
            
            cat > /tmp/route53.json << EOF
{
  "Comment": "Update adamguard subdomain",
  "Changes": [
    {
      "Action": "UPSERT",
      "ResourceRecordSet": {
        "Name": "adamguard.deeptech-ai.co.uk",
        "Type": "A",
        "AliasTarget": {
          "HostedZoneId": "$ALB_ZONE_ID",
          "DNSName": "dualstack.$ALB_DNS",
          "EvaluateTargetHealth": true
        }
      }
    }
  ]
}
EOF
            
            aws route53 change-resource-record-sets --hosted-zone-id $ZONE_ID --change-batch file:///tmp/route53.json
            
            echo "Route 53 updated!"
          else
            echo "No hosted zone found"
          fi

      - name: Step 15 - Test Connection
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          
          echo ""
          echo "=========================================="
          echo "🧪 TESTING CONNECTIONS"
          echo "=========================================="
          
          echo ""
          echo "Waiting additional 30 seconds for propagation..."
          sleep 30
          
          echo ""
          echo "=== Testing ALB Direct ==="
          echo "URL: http://$ALB_DNS"
          curl -I "http://$ALB_DNS" --max-time 15 2>&1 || echo "Connection test failed"
          
          echo ""
          echo "=== Testing Subdomain ==="
          echo "URL: http://adamguard.deeptech-ai.co.uk"
          curl -I "http://adamguard.deeptech-ai.co.uk" --max-time 15 2>&1 || echo "Connection test failed"
          
          echo ""
          echo "=========================================="
          echo "📱 ACCESS URLS"
          echo "=========================================="
          echo ""
          echo "Direct ALB: http://$ALB_DNS"
          echo "Subdomain:  http://adamguard.deeptech-ai.co.uk"
          echo ""
          echo "If still getting 504, wait 2-3 minutes and try again."
          echo "The health checks need time to pass."
