# AdamGuard - Complete Fix for 504 Error
# Creates ECS Service with ALB integration

name: Fix ALB

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPO: adamguard-pro

jobs:
  fix:
    name: Fix 504 Error
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get Account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Step 1 - Diagnosis
        run: |
          echo "=========================================="
          echo "🔍 CURRENT STATE"
          echo "=========================================="
          
          echo ""
          echo "=== ALBs ==="
          aws elbv2 describe-load-balancers --query "LoadBalancers[*].[LoadBalancerName,DNSName,State.Code]" --output table
          
          echo ""
          echo "=== Target Groups ==="
          aws elbv2 describe-target-groups --query "TargetGroups[*].[TargetGroupName,Port,TargetType]" --output table
          
          echo ""
          echo "=== ECS Clusters ==="
          aws ecs list-clusters --query "clusterArns[*]" --output table

      - name: Step 2 - Get Network Config
        id: net
        run: |
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
          
          # Get subnets
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" --query "Subnets[*].SubnetId" --output text)
          SUB1=$(echo $SUBNETS | awk '{print $1}')
          SUB2=$(echo $SUBNETS | awk '{print $2}')
          [ -z "$SUB2" ] && SUB2=$SUB1
          
          # Get or create security group
          SG=$(aws ec2 describe-security-groups --filters "Name=group-name,Values=adamguard-sg" "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "")
          
          if [ -z "$SG" ] || [ "$SG" = "None" ]; then
            SG=$(aws ec2 create-security-group --group-name adamguard-sg --description "AdamGuard" --vpc-id $VPC_ID --query "GroupId" --output text)
            sleep 2
          fi
          
          # Add rules
          aws ec2 authorize-security-group-ingress --group-id $SG --protocol tcp --port 80 --cidr 0.0.0.0/0 2>/dev/null || true
          aws ec2 authorize-security-group-ingress --group-id $SG --protocol tcp --port 3000 --cidr 0.0.0.0/0 2>/dev/null || true
          
          echo "VPC: $VPC_ID, Subnets: $SUB1, $SUB2, SG: $SG"
          
          echo "vpc=$VPC_ID" >> $GITHUB_OUTPUT
          echo "sub1=$SUB1" >> $GITHUB_OUTPUT
          echo "sub2=$SUB2" >> $GITHUB_OUTPUT
          echo "sg=$SG" >> $GITHUB_OUTPUT

      - name: Step 3 - Create Target Group
        id: tg
        run: |
          VPC="${{ steps.net.outputs.vpc }}"
          
          # Use specific name for SSL ALB
          TG_ARN=$(aws elbv2 describe-target-groups --names adamguard-ssl-tg --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || echo "")
          
          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            TG_ARN=$(aws elbv2 create-target-group \
              --name adamguard-ssl-tg \
              --protocol HTTP \
              --port 3000 \
              --vpc-id $VPC \
              --target-type ip \
              --health-check-path "/" \
              --health-check-interval-seconds 30 \
              --query "TargetGroups[0].TargetGroupArn" \
              --output text)
          fi
          
          echo "Target Group: $TG_ARN"
          echo "tg_arn=$TG_ARN" >> $GITHUB_OUTPUT

      - name: Step 4 - Get ALB
        id: alb
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers --names adamguard-ssl-alb --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "")
          ALB_DNS=$(aws elbv2 describe-load-balancers --names adamguard-ssl-alb --query "LoadBalancers[0].DNSName" --output text 2>/dev/null || echo "")
          
          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            echo "ALB not found!"
            exit 1
          fi
          
          echo "ALB: $ALB_ARN"
          echo "DNS: $ALB_DNS"
          
          echo "alb_arn=$ALB_ARN" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Step 5 - Fix ALB Listener
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          
          # Delete old listeners
          OLD_LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[*].ListenerArn" --output text 2>/dev/null || echo "")
          
          for l in $OLD_LISTENERS; do
            [ -n "$l" ] && [ "$l" != "None" ] && aws elbv2 delete-listener --listener-arn "$l" && echo "Deleted: $l"
          done
          
          sleep 2
          
          # Create new HTTP listener
          aws elbv2 create-listener \
            --load-balancer-arn "$ALB_ARN" \
            --protocol HTTP \
            --port 80 \
            --default-actions Type=forward,TargetGroupArn="$TG_ARN"
          
          echo "Listener created!"

      - name: Step 6 - Setup IAM Role
        run: |
          if ! aws iam get-role --role-name ecsTaskExecutionRole 2>/dev/null; then
            cat > /tmp/trust.json << 'EOF'
{"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"ecs-tasks.amazonaws.com"},"Action":"sts:AssumeRole"}]}
EOF
            aws iam create-role --role-name ecsTaskExecutionRole --assume-role-policy-document file:///tmp/trust.json 2>/dev/null || true
            aws iam attach-role-policy --role-name ecsTaskExecutionRole --policy-arn arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy 2>/dev/null || true
            sleep 10
          fi
          echo "IAM role ready"

      - name: Step 7 - Create ECS Cluster
        run: |
          aws ecs create-cluster --cluster-name adamguard-prod 2>/dev/null || echo "Cluster exists"
          aws logs create-log-group --log-group-name /ecs/adamguard 2>/dev/null || echo "Log group exists"

      - name: Step 8 - Register Task Definition
        run: |
          IMAGE="${{ env.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPO }}:latest"
          
          cat > /tmp/task.json << EOF
{
  "family": "adamguard-task",
  "networkMode": "awsvpc",
  "requiresCompatibilities": ["FARGATE"],
  "cpu": "512",
  "memory": "1024",
  "executionRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
  "containerDefinitions": [{
    "name": "adamguard-app",
    "image": "$IMAGE",
    "essential": true,
    "portMappings": [{"containerPort": 3000, "protocol": "tcp"}],
    "environment": [
      {"name": "NODE_ENV", "value": "production"},
      {"name": "PORT", "value": "3000"}
    ],
    "logConfiguration": {
      "logDriver": "awslogs",
      "options": {
        "awslogs-group": "/ecs/adamguard",
        "awslogs-region": "${{ env.AWS_REGION }}",
        "awslogs-stream-prefix": "ecs"
      }
    }
  }]
}
EOF
          
          aws ecs register-task-definition --cli-input-json file:///tmp/task.json

      - name: Step 9 - Delete Old Services
        run: |
          CLUSTER="adamguard-prod"
          
          SERVICES=$(aws ecs list-services --cluster $CLUSTER --query "serviceArns[*]" --output text 2>/dev/null || echo "")
          
          for s in $SERVICES; do
            if [ -n "$s" ] && [ "$s" != "None" ]; then
              sname=$(echo $s | rev | cut -d'/' -f1 | rev)
              echo "Deleting: $sname"
              aws ecs delete-service --cluster $CLUSTER --service "$sname" --force 2>/dev/null || true
            fi
          done
          
          echo "Waiting for deletion..."
          sleep 15

      - name: Step 10 - Create ECS Service with ALB
        run: |
          CLUSTER="adamguard-prod"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          SUB1="${{ steps.net.outputs.sub1 }}"
          SUB2="${{ steps.net.outputs.sub2 }}"
          SG="${{ steps.net.outputs.sg }}"
          
          echo "Creating ECS Service with ALB..."
          
          aws ecs create-service \
            --cluster $CLUSTER \
            --service-name adamguard-service \
            --task-definition adamguard-task \
            --desired-count 2 \
            --launch-type FARGATE \
            --network-configuration "awsvpcConfiguration={subnets=[$SUB1,$SUB2],securityGroups=[$SG],assignPublicIp=ENABLED}" \
            --load-balancers "targetGroupArn=$TG_ARN,containerName=adamguard-app,containerPort=3000" \
            --query "service.status" \
            --output text
          
          echo ""
          echo "Service created! Waiting 2 minutes for tasks..."
          sleep 120

      - name: Step 11 - Verify
        run: |
          CLUSTER="adamguard-prod"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          
          echo "=========================================="
          echo "🔍 VERIFICATION"
          echo "=========================================="
          
          echo ""
          echo "=== Service Status ==="
          aws ecs describe-services --cluster $CLUSTER --services adamguard-service --query "services[0].[status,runningCount,desiredCount]" --output table 2>/dev/null || echo "Service not ready"
          
          echo ""
          echo "=== Tasks ==="
          TASKS=$(aws ecs list-tasks --cluster $CLUSTER --service adamguard-service --query "taskArns[*]" --output text 2>/dev/null || echo "")
          if [ -n "$TASKS" ]; then
            aws ecs describe-tasks --cluster $CLUSTER --tasks $TASKS --query "tasks[*].[lastStatus,containers[0].lastStatus]" --output table
          fi
          
          echo ""
          echo "=== Target Health ==="
          aws elbv2 describe-target-health --target-group-arn "$TG_ARN" --query "TargetHealthDescriptions[*].[Target.Id,TargetHealth.State]" --output table 2>/dev/null || echo "No targets yet"
          
          echo ""
          echo "=== Connection Test ==="
          echo "Testing: http://$ALB_DNS"
          curl -I "http://$ALB_DNS" --max-time 10 2>&1 || echo "Test failed - may need more time"
          
          echo ""
          echo "=========================================="
          echo "📱 ACCESS URLS"
          echo "=========================================="
          echo ""
          echo "Direct: http://$ALB_DNS"
          echo "Subdomain: http://adamguard.deeptech-ai.co.uk"
          echo ""
          echo "NOTE: Health checks need 1-2 minutes to pass."
          echo "If 504 persists, wait 2 minutes and retry."
