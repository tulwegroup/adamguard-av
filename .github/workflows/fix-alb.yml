# AdamGuard - Fix ALB (Single ALB)

name: Fix ALB

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  fix-alb:
    name: Fix ALB Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: List All ALBs
        run: |
          echo "=========================================="
          echo "🔍 ALL LOAD BALANCERS"
          echo "=========================================="
          aws elbv2 describe-load-balancers --query "LoadBalancers[*].[LoadBalancerName,DNSName,State.Code]" --output table

      - name: Use adamguard-ssl-alb
        id: alb
        run: |
          ALB_NAME="adamguard-ssl-alb"
          
          ALB_ARN=$(aws elbv2 describe-load-balancers --names $ALB_NAME --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "None")
          
          if [ "$ALB_ARN" = "None" ]; then
            echo "Trying adamguard-alb..."
            ALB_NAME="adamguard-alb"
            ALB_ARN=$(aws elbv2 describe-load-balancers --names $ALB_NAME --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "None")
          fi
          
          ALB_DNS=$(aws elbv2 describe-load-balancers --names $ALB_NAME --query "LoadBalancers[0].DNSName" --output text)
          
          echo "Using ALB: $ALB_NAME"
          echo "ARN: $ALB_ARN"
          echo "DNS: $ALB_DNS"
          
          echo "alb_arn=$ALB_ARN" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT
          echo "alb_name=$ALB_NAME" >> $GITHUB_OUTPUT

      - name: Check Target Groups
        id: tg
        run: |
          echo ""
          echo "=========================================="
          echo "🔍 TARGET GROUPS"
          echo "=========================================="
          
          aws elbv2 describe-target-groups --query "TargetGroups[*].[TargetGroupName,TargetGroupArn,Protocol,Port]" --output table
          
          TG_ARN=$(aws elbv2 describe-target-groups --query "TargetGroups[?contains(TargetGroupName, 'adamguard')].TargetGroupArn" --output text | head -1)
          TG_NAME=$(aws elbv2 describe-target-groups --query "TargetGroups[?contains(TargetGroupName, 'adamguard')].TargetGroupName" --output text | head -1)
          
          echo ""
          echo "Using Target Group: $TG_NAME"
          echo "ARN: $TG_ARN"
          
          echo "tg_arn=$TG_ARN" >> $GITHUB_OUTPUT

      - name: Check Target Health
        run: |
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          
          echo ""
          echo "=========================================="
          echo "🔍 TARGET HEALTH"
          echo "=========================================="
          
          if [ -n "$TG_ARN" ] && [ "$TG_ARN" != "None" ]; then
            aws elbv2 describe-target-health --target-group-arn $TG_ARN --query "TargetHealthDescriptions[*].[Target.Id,TargetHealth.State,TargetHealth.Reason]" --output table
          else
            echo "No target group found"
          fi

      - name: Delete Old Listeners
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          
          echo ""
          echo "=========================================="
          echo "🗑️ DELETING OLD LISTENERS"
          echo "=========================================="
          
          LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[*].ListenerArn" --output text 2>/dev/null || echo "")
          
          for listener in $LISTENERS; do
            if [ -n "$listener" ] && [ "$listener" != "None" ]; then
              echo "Deleting: $listener"
              aws elbv2 delete-listener --listener-arn "$listener" || echo "Could not delete"
            fi
          done
          
          echo "Done!"

      - name: Create HTTP Listener
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          
          echo ""
          echo "=========================================="
          echo "🔧 CREATING HTTP LISTENER (PORT 80)"
          echo "=========================================="
          
          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            echo "❌ No target group! Creating one..."
            
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
            
            TG_ARN=$(aws elbv2 create-target-group \
              --name adamguard-tg \
              --protocol HTTP \
              --port 3000 \
              --vpc-id $VPC_ID \
              --target-type ip \
              --health-check-path "/" \
              --query "TargetGroups[0].TargetGroupArn" \
              --output text)
            
            echo "Created TG: $TG_ARN"
          fi
          
          echo "Creating listener..."
          aws elbv2 create-listener \
            --load-balancer-arn "$ALB_ARN" \
            --protocol HTTP \
            --port 80 \
            --default-actions Type=forward,TargetGroupArn="$TG_ARN"
          
          echo "✅ Listener created!"

      - name: Check ECS Service
        run: |
          echo ""
          echo "=========================================="
          echo "🔍 ECS SERVICE"
          echo "=========================================="
          
          CLUSTER="adamguard-prod"
          
          SERVICE=$(aws ecs list-services --cluster $CLUSTER --query "serviceArns[0]" --output text 2>/dev/null || echo "None")
          
          if [ "$SERVICE" = "None" ]; then
            # Try other cluster
            CLUSTER=$(aws ecs list-clusters --query "clusterArns[0]" --output text | rev | cut -d'/' -f1 | rev)
            SERVICE=$(aws ecs list-services --cluster $CLUSTER --query "serviceArns[0]" --output text 2>/dev/null || echo "None")
          fi
          
          echo "Cluster: $CLUSTER"
          
          if [ "$SERVICE" != "None" ]; then
            SERVICE_NAME=$(echo $SERVICE | rev | cut -d'/' -f1 | rev)
            
            aws ecs describe-services --cluster $CLUSTER --services $SERVICE_NAME --query "services[0].[status,runningCount,desiredCount]" --output table
            
            RUNNING=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE_NAME --query "services[0].runningCount" --output text)
            
            if [ "$RUNNING" = "0" ]; then
              echo ""
              echo "No running tasks! Forcing new deployment..."
              aws ecs update-service --cluster $CLUSTER --service $SERVICE_NAME --force-new-deployment --desired-count 2
            fi
          else
            echo "No service found"
          fi

      - name: Register Targets
        run: |
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          
          echo ""
          echo "=========================================="
          echo "🔧 CHECKING REGISTERED TARGETS"
          echo "=========================================="
          
          # Get ECS task IPs
          CLUSTER="adamguard-prod"
          
          TASKS=$(aws ecs list-tasks --cluster $CLUSTER --query "taskArns" --output text 2>/dev/null || echo "")
          
          if [ -n "$TASKS" ]; then
            echo "Found tasks, checking IPs..."
            
            for task in $TASKS; do
              ENI=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $task --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" --output text 2>/dev/null || echo "")
              
              if [ -n "$ENI" ] && [ "$ENI" != "None" ]; then
                PRIVATE_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI --query "NetworkInterfaces[0].PrivateIpAddress" --output text 2>/dev/null || echo "")
                
                if [ -n "$PRIVATE_IP" ] && [ "$PRIVATE_IP" != "None" ]; then
                  echo "Task IP: $PRIVATE_IP"
                fi
              fi
            done
          fi

      - name: Wait and Test
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          
          echo ""
          echo "Waiting 30 seconds..."
          sleep 30
          
          echo ""
          echo "=========================================="
          echo "🧪 TESTING CONNECTION"
          echo "=========================================="
          
          echo ""
          echo "Testing: http://$ALB_DNS"
          curl -I "http://$ALB_DNS" --max-time 10 2>&1 || echo "Connection test failed"
          
          echo ""
          echo "=========================================="
          echo "📱 ACCESS URLS"
          echo "=========================================="
          echo ""
          echo "Direct ALB: http://$ALB_DNS"
          echo "Subdomain: http://adamguard.deeptech-ai.co.uk"
          echo ""
