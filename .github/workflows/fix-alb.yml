# AdamGuard - Fix ALB Listeners

name: Fix ALB

on:
  workflow_dispatch:

env:
  AWS_REGION: us-east-1

jobs:
  fix-alb:
    name: Fix ALB Configuration
    runs-on: ubuntu-latest
    
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Get AWS Account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Check Current ALB State
        run: |
          echo "=========================================="
          echo "🔍 CURRENT ALB STATE"
          echo "=========================================="
          
          # List all ALBs
          echo "All Load Balancers:"
          aws elbv2 describe-load-balancers --query "LoadBalancers[*].[LoadBalancerName,DNSName,State.Code]" --output table
          
          # Get AdamGuard ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?contains(LoadBalancerName, 'adamguard')].LoadBalancerArn" --output text | head -1)
          
          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            echo "❌ No ALB found!"
            exit 1
          fi
          
          echo ""
          echo "ALB ARN: $ALB_ARN"
          
          # Check listeners
          echo ""
          echo "Listeners:"
          aws elbv2 describe-listeners --load-balancer-arn $ALB_ARN --query "Listeners[*].[Protocol,Port,DefaultActions[0].Type]" --output table
          
          # Check target groups
          echo ""
          echo "Target Groups:"
          aws elbv2 describe-target-groups --load-balancer-arn $ALB_ARN --query "TargetGroups[*].[TargetGroupName,Protocol,Port,HealthCheckPath]" --output table

      - name: Check Target Health
        run: |
          echo ""
          echo "=========================================="
          echo "🔍 TARGET HEALTH"
          echo "=========================================="
          
          TG_ARN=$(aws elbv2 describe-target-groups --query "TargetGroups[?contains(TargetGroupName, 'adamguard')].TargetGroupArn" --output text | head -1)
          
          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            echo "❌ No target group found!"
            exit 1
          fi
          
          echo "Target Group: $TG_ARN"
          echo ""
          aws elbv2 describe-target-health --target-group-arn $TG_ARN --output table

      - name: Fix ALB Listeners
        run: |
          echo ""
          echo "=========================================="
          echo "🔧 FIXING ALB LISTENERS"
          echo "=========================================="
          
          ALB_ARN=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?contains(LoadBalancerName, 'adamguard')].LoadBalancerArn" --output text | head -1)
          TG_ARN=$(aws elbv2 describe-target-groups --query "TargetGroups[?contains(TargetGroupName, 'adamguard')].TargetGroupArn" --output text | head -1)
          
          echo "ALB: $ALB_ARN"
          echo "Target Group: $TG_ARN"
          
          # Delete existing listeners
          LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn $ALB_ARN --query "Listeners[*].ListenerArn" --output text)
          
          for listener in $LISTENERS; do
            echo "Deleting listener: $listener"
            aws elbv2 delete-listener --listener-arn $listener || true
          done
          
          sleep 5
          
          # Create HTTP listener on port 80
          echo ""
          echo "Creating HTTP listener on port 80..."
          aws elbv2 create-listener \
            --load-balancer-arn $ALB_ARN \
            --protocol HTTP \
            --port 80 \
            --default-actions Type=forward,TargetGroupArn=$TG_ARN
          
          echo "✅ HTTP listener created!"

      - name: Ensure ECS Tasks Running
        run: |
          echo ""
          echo "=========================================="
          echo "🔧 CHECKING ECS SERVICE"
          echo "=========================================="
          
          CLUSTER=$(aws ecs list-clusters --query "clusterArns[?contains(@, 'adamguard')]" --output text | head -1 | rev | cut -d'/' -f1 | rev)
          
          if [ -z "$CLUSTER" ]; then
            CLUSTER=$(aws ecs list-clusters --query "clusterArns[0]" --output text | rev | cut -d'/' -f1 | rev)
          fi
          
          echo "Cluster: $CLUSTER"
          
          # Check service
          SERVICE=$(aws ecs list-services --cluster $CLUSTER --query "serviceArns[0]" --output text | rev | cut -d'/' -f1 | rev)
          
          echo "Service: $SERVICE"
          
          RUNNING=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE --query "services[0].runningCount" --output text)
          DESIRED=$(aws ecs describe-services --cluster $CLUSTER --services $SERVICE --query "services[0].desiredCount" --output text)
          
          echo "Running: $RUNNING / $DESIRED"
          
          if [ "$RUNNING" = "0" ] || [ "$RUNNING" != "$DESIRED" ]; then
            echo ""
            echo "Forcing new deployment..."
            aws ecs update-service --cluster $CLUSTER --service $SERVICE --force-new-deployment --desired-count 2
          fi

      - name: Wait and Test
        run: |
          echo ""
          echo "Waiting 60 seconds for changes to take effect..."
          sleep 60
          
          ALB_DNS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?contains(LoadBalancerName, 'adamguard')].DNSName" --output text | head -1)
          
          echo ""
          echo "=========================================="
          echo "🧪 TESTING CONNECTION"
          echo "=========================================="
          echo ""
          echo "Testing: http://$ALB_DNS"
          
          curl -I "http://$ALB_DNS" --max-time 10 2>&1 || echo "Direct test failed"
          
          # Check target health again
          TG_ARN=$(aws elbv2 describe-target-groups --query "TargetGroups[?contains(TargetGroupName, 'adamguard')].TargetGroupArn" --output text | head -1)
          
          echo ""
          echo "Target Health:"
          aws elbv2 describe-target-health --target-group-arn $TG_ARN --query "TargetHealthDescriptions[*].[Target.Id,TargetHealth.State,TargetHealth.Reason]" --output table

      - name: Get Final URLs
        run: |
          ALB_DNS=$(aws elbv2 describe-load-balancers --query "LoadBalancers[?contains(LoadBalancerName, 'adamguard')].DNSName" --output text | head -1)
          
          echo ""
          echo "=========================================="
          echo "📱 ACCESS URLS"
          echo "=========================================="
          echo ""
          echo "Direct ALB:"
          echo "  http://$ALB_DNS"
          echo ""
          echo "Subdomain:"
          echo "  http://adamguard.deeptech-ai.co.uk"
          echo ""
          echo "=========================================="
