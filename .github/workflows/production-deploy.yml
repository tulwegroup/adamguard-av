# AdamGuard Pro - Production Deployment (Fixed)
# Uses existing infrastructure:
# - ECS Cluster: adamguard-app
# - ALB: adamguard-ssl-alb
# - Target Group: adamguard-ssl-tg
# - SSL Certificate: *.deeptech-ai.co.uk wildcard

name: AdamGuard Production Deploy

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  ECR_REPOSITORY: adamguard-pro
  ECS_CLUSTER: adamguard-app
  ALB_NAME: adamguard-ssl-alb
  TARGET_GROUP_NAME: adamguard-ssl-tg
  SSL_CERT_ARN: arn:aws:acm:us-east-1:368331615566:certificate/5b3459d7-e0fe-4346-acc4-25c059c36fac
  DOMAIN: adamguard.deeptech-ai.co.uk

jobs:
  # ===========================================
  # Build and Push Docker Image
  # ===========================================
  build-and-push:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: bun install

      - name: Build application
        run: bun run build
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/test
          NEXTAUTH_SECRET: ${{ secrets.NEXTAUTH_SECRET }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Create ECR repository if not exists
        run: |
          aws ecr describe-repositories --repository-names ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} 2>/dev/null || \
          aws ecr create-repository --repository-name ${{ env.ECR_REPOSITORY }} --region ${{ env.AWS_REGION }} || true

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:latest
            ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          provenance: false
          sbom: false

  # ===========================================
  # Deploy to ECS
  # ===========================================
  deploy-ecs:
    name: Deploy ECS Service
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1

      - name: Get AWS Account ID
        run: echo "AWS_ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)" >> $GITHUB_ENV

      - name: Get Existing Infrastructure
        id: infra
        run: |
          echo "=========================================="
          echo "🔍 GETTING EXISTING INFRASTRUCTURE"
          echo "=========================================="

          # Get VPC
          VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
          echo "VPC: $VPC_ID"

          # Get Subnets
          SUBNETS=$(aws ec2 describe-subnets --filters "Name=vpc-id,Values=$VPC_ID" "Name=default-for-az,Values=true" --query "Subnets[*].SubnetId" --output text)
          SUBNET_ARRAY=($SUBNETS)
          SUBNET_1=${SUBNET_ARRAY[0]}
          SUBNET_2=${SUBNET_ARRAY[1]}
          echo "Subnets: $SUBNET_1, $SUBNET_2"

          # Get Security Group
          SG_ID=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" "Name=group-name,Values=adamguard-prod-sg" --query "SecurityGroups[0].GroupId" --output text 2>/dev/null || echo "")
          if [ -z "$SG_ID" ] || [ "$SG_ID" = "None" ]; then
            # Try alternate security group name
            SG_ID=$(aws ec2 describe-security-groups --filters "Name=vpc-id,Values=$VPC_ID" --query "SecurityGroups[?contains(GroupName, 'adamguard')].GroupId" --output text 2>/dev/null | head -1)
          fi
          echo "Security Group: $SG_ID"

          # Get Target Group
          TG_ARN=$(aws elbv2 describe-target-groups --names ${{ env.TARGET_GROUP_NAME }} --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || echo "")
          echo "Target Group: $TG_ARN"

          # Get ALB
          ALB_ARN=$(aws elbv2 describe-load-balancers --names ${{ env.ALB_NAME }} --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "")
          ALB_DNS=$(aws elbv2 describe-load-balancers --names ${{ env.ALB_NAME }} --query "LoadBalancers[0].DNSName" --output text 2>/dev/null || echo "")
          echo "ALB: $ALB_ARN"
          echo "ALB DNS: $ALB_DNS"

          echo "vpc_id=$VPC_ID" >> $GITHUB_OUTPUT
          echo "subnet_1=$SUBNET_1" >> $GITHUB_OUTPUT
          echo "subnet_2=$SUBNET_2" >> $GITHUB_OUTPUT
          echo "sg_id=$SG_ID" >> $GITHUB_OUTPUT
          echo "tg_arn=$TG_ARN" >> $GITHUB_OUTPUT
          echo "alb_arn=$ALB_ARN" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Create CloudWatch Log Group
        run: |
          aws logs create-log-group --log-group-name /ecs/adamguard-app --region ${{ env.AWS_REGION }} 2>/dev/null || echo "Log group exists"

      - name: Ensure Secrets Exist
        run: |
          echo "Checking/Creating AWS Secrets Manager secrets..."

          # Generate secure random secrets if needed
          NEXTAUTH_SECRET=$(openssl rand -base64 48 | tr -d '\n')
          JWT_SECRET=$(openssl rand -base64 48 | tr -d '\n')

          # Create or update nextauth secret
          if aws secretsmanager describe-secret --secret-id adamguard/nextauth --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Secret adamguard/nextauth already exists"
          else
            echo "Creating secret adamguard/nextauth..."
            aws secretsmanager create-secret \
              --name adamguard/nextauth \
              --secret-string "$NEXTAUTH_SECRET" \
              --description "AdamGuard Pro NextAuth Secret" \
              --region ${{ env.AWS_REGION }} || true
          fi

          # Create or update jwt secret
          if aws secretsmanager describe-secret --secret-id adamguard/jwt --region ${{ env.AWS_REGION }} 2>/dev/null; then
            echo "Secret adamguard/jwt already exists"
          else
            echo "Creating secret adamguard/jwt..."
            aws secretsmanager create-secret \
              --name adamguard/jwt \
              --secret-string "$JWT_SECRET" \
              --description "AdamGuard Pro JWT Secret" \
              --region ${{ env.AWS_REGION }} || true
          fi

          echo "✅ Secrets configured"

      - name: Register ECS Task Definition
        run: |
          cat > /tmp/task-definition.json << EOF
          {
            "family": "adamguard-app-task",
            "networkMode": "awsvpc",
            "requiresCompatibilities": ["FARGATE"],
            "cpu": "1024",
            "memory": "2048",
            "executionRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
            "taskRoleArn": "arn:aws:iam::${{ env.AWS_ACCOUNT_ID }}:role/ecsTaskExecutionRole",
            "containerDefinitions": [
              {
                "name": "adamguard-app",
                "image": "${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}",
                "essential": true,
                "portMappings": [{"containerPort": 3000, "protocol": "tcp"}],
                "environment": [
                  {"name": "NODE_ENV", "value": "production"},
                  {"name": "PORT", "value": "3000"}
                ],
                "secrets": [
                  {"name": "NEXTAUTH_SECRET", "valueFrom": "arn:aws:secretsmanager:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:secret:adamguard/nextauth"},
                  {"name": "JWT_SECRET", "valueFrom": "arn:aws:secretsmanager:${{ env.AWS_REGION }}:${{ env.AWS_ACCOUNT_ID }}:secret:adamguard/jwt"}
                ],
                "logConfiguration": {
                  "logDriver": "awslogs",
                  "options": {
                    "awslogs-group": "/ecs/adamguard-app",
                    "awslogs-region": "${{ env.AWS_REGION }}",
                    "awslogs-stream-prefix": "ecs"
                  }
                },
                "healthCheck": {
                  "command": ["CMD-SHELL", "curl -f http://localhost:3000/ || exit 1"],
                  "interval": 30,
                  "timeout": 10,
                  "retries": 5,
                  "startPeriod": 120
                }
              }
            ]
          }
          EOF

          aws ecs register-task-definition --cli-input-json file:///tmp/task-definition.json --region ${{ env.AWS_REGION }}

      - name: Update ECS Service
        run: |
          echo "=========================================="
          echo "🚀 UPDATING ECS SERVICE"
          echo "=========================================="

          # Check if service exists
          SERVICE_INFO=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services adamguard-service --query "services[0]" --output json 2>/dev/null || echo "null")
          SERVICE_STATUS=$(echo "$SERVICE_INFO" | jq -r '.status // "MISSING"')

          echo "Service status: $SERVICE_STATUS"

          if [ "$SERVICE_STATUS" = "ACTIVE" ]; then
            echo "Updating existing service with new task definition..."
            aws ecs update-service \
              --cluster ${{ env.ECS_CLUSTER }} \
              --service adamguard-service \
              --task-definition adamguard-app-task \
              --force-new-deployment \
              --region ${{ env.AWS_REGION }}
          else
            echo "Service not found or not active, checking for other services..."

            # List existing services
            SERVICES=$(aws ecs list-services --cluster ${{ env.ECS_CLUSTER }} --query "serviceArns[*]" --output text 2>/dev/null || echo "")
            echo "Existing services: $SERVICES"

            if [ -n "$SERVICES" ]; then
              # Get the first service name
              SERVICE_NAME=$(echo "$SERVICES" | xargs -n1 | head -1 | xargs basename)
              echo "Using service: $SERVICE_NAME"

              aws ecs update-service \
                --cluster ${{ env.ECS_CLUSTER }} \
                --service $SERVICE_NAME \
                --task-definition adamguard-app-task \
                --force-new-deployment \
                --region ${{ env.AWS_REGION }}
            else
              echo "No services found in cluster, will wait for manual registration..."
            fi
          fi

      - name: Wait for Service Stability
        run: |
          echo "=========================================="
          echo "⏳ WAITING FOR SERVICE STABILITY"
          echo "=========================================="

          # Wait up to 15 minutes for service stability
          MAX_ATTEMPTS=90
          ATTEMPT=0

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            # Get running task count
            RUNNING_COUNT=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services adamguard-service --query "services[0].runningCount" --output text 2>/dev/null || echo "0")
            DESIRED_COUNT=$(aws ecs describe-services --cluster ${{ env.ECS_CLUSTER }} --services adamguard-service --query "services[0].desiredCount" --output text 2>/dev/null || echo "0")

            echo "Attempt $ATTEMPT/$MAX_ATTEMPTS - Running: $RUNNING_COUNT, Desired: $DESIRED_COUNT"

            if [ "$RUNNING_COUNT" = "$DESIRED_COUNT" ] && [ "$RUNNING_COUNT" != "0" ]; then
              echo "✅ Service is stable!"
              break
            fi

            sleep 10
          done

          if [ $ATTEMPT -eq $MAX_ATTEMPTS ]; then
            echo "⚠️ Timeout waiting for service stability, but continuing..."
          fi

      - name: Register Tasks with ALB
        run: |
          echo "=========================================="
          echo "📝 REGISTERING TASKS WITH ALB"
          echo "=========================================="

          TG_ARN="${{ steps.infra.outputs.tg_arn }}"

          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            echo "Target Group not found, creating..."
            VPC_ID="${{ steps.infra.outputs.vpc_id }}"
            TG_ARN=$(aws elbv2 create-target-group \
              --name ${{ env.TARGET_GROUP_NAME }} \
              --protocol HTTP \
              --port 3000 \
              --vpc-id $VPC_ID \
              --target-type ip \
              --health-check-path "/" \
              --query "TargetGroups[0].TargetGroupArn" \
              --output text)
          fi

          echo "Target Group: $TG_ARN"

          # Get running tasks
          TASKS=$(aws ecs list-tasks --cluster ${{ env.ECS_CLUSTER }} --desired-status RUNNING --query "taskArns[*]" --output text 2>/dev/null || echo "")

          if [ -z "$TASKS" ]; then
            echo "No running tasks found!"
            exit 1
          fi

          echo "Found tasks: $TASKS"

          # Get task IPs and register them
          TARGETS=""
          for task in $TASKS; do
            ENI=$(aws ecs describe-tasks --cluster ${{ env.ECS_CLUSTER }} --tasks $task --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" --output text 2>/dev/null || echo "")

            if [ -n "$ENI" ] && [ "$ENI" != "None" ]; then
              PRIVATE_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI --query "NetworkInterfaces[0].PrivateIpAddress" --output text 2>/dev/null || echo "")

              if [ -n "$PRIVATE_IP" ] && [ "$PRIVATE_IP" != "None" ]; then
                echo "Task: $task -> IP: $PRIVATE_IP"
                if [ -z "$TARGETS" ]; then
                  TARGETS="Id=$PRIVATE_IP,Port=3000"
                else
                  TARGETS="$TARGETS Id=$PRIVATE_IP,Port=3000"
                fi
              fi
            fi
          done

          if [ -z "$TARGETS" ]; then
            echo "No task IPs found!"
            exit 1
          fi

          echo "Registering targets: $TARGETS"
          aws elbv2 register-targets --target-group-arn "$TG_ARN" --targets $TARGETS

          echo "Waiting 30 seconds for health checks..."
          sleep 30

          echo ""
          echo "=== Target Health ==="
          aws elbv2 describe-target-health --target-group-arn "$TG_ARN" --query "TargetHealthDescriptions[*].[Target.Id,TargetHealth.State]" --output table

      - name: Verify Deployment
        run: |
          echo "=========================================="
          echo "🔍 VERIFYING DEPLOYMENT"
          echo "=========================================="

          echo ""
          echo "Testing HTTPS..."
          curl -sI "https://${{ env.DOMAIN }}" --max-time 10 2>&1 | head -10

          echo ""
          echo "Testing HTTP redirect..."
          curl -sI "http://${{ env.DOMAIN }}" --max-time 10 2>&1 | head -5

      - name: Deployment Summary
        run: |
          echo ""
          echo "=========================================="
          echo "🚀 DEPLOYMENT COMPLETE!"
          echo "=========================================="
          echo ""
          echo "📱 Application URL: https://${{ env.DOMAIN }}"
          echo "📊 ECS Cluster: ${{ env.ECS_CLUSTER }}"
          echo "🔐 SSL Certificate: *.deeptech-ai.co.uk"
          echo ""
          echo "Monitor: https://console.aws.amazon.com/ecs/home?region=${{ env.AWS_REGION }}#/clusters/${{ env.ECS_CLUSTER }}"
          echo "=========================================="
