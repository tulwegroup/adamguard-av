# AdamGuard - SSL Configuration
# Enables HTTPS with SSL certificate

name: SSL Setup

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:

env:
  AWS_REGION: us-east-1
  SSL_CERT_ARN: arn:aws:acm:us-east-1:368331615566:certificate/5b3459d7-e0fe-4346-acc4-25c059c36fac

jobs:
  ssl-setup:
    name: Configure SSL/HTTPS
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Check SSL Certificate Status
        id: cert
        run: |
          echo "=========================================="
          echo "🔍 CHECKING SSL CERTIFICATE"
          echo "=========================================="

          CERT_STATUS=$(aws acm describe-certificate --certificate-arn "${{ env.SSL_CERT_ARN }}" --query "Certificate.Status" --output text 2>/dev/null || echo "NOT_FOUND")
          echo "Certificate Status: $CERT_STATUS"

          if [ "$CERT_STATUS" = "ISSUED" ]; then
            echo "✅ Certificate is ISSUED and ready to use!"
            echo "cert_ready=true" >> $GITHUB_OUTPUT
          else
            echo "⚠️ Certificate status: $CERT_STATUS"
            echo "cert_ready=false" >> $GITHUB_OUTPUT

            if [ "$CERT_STATUS" = "PENDING_VALIDATION" ]; then
              echo ""
              echo "Certificate needs DNS validation. Validation records:"
              aws acm describe-certificate --certificate-arn "${{ env.SSL_CERT_ARN }}" --query "Certificate.DomainValidationOptions[*].ResourceRecord" --output table
            fi
          fi

      - name: Get ALB Info
        id: alb
        run: |
          ALB_ARN=$(aws elbv2 describe-load-balancers --names adamguard-ssl-alb --query "LoadBalancers[0].LoadBalancerArn" --output text 2>/dev/null || echo "")
          ALB_DNS=$(aws elbv2 describe-load-balancers --names adamguard-ssl-alb --query "LoadBalancers[0].DNSName" --output text 2>/dev/null || echo "")

          if [ -z "$ALB_ARN" ] || [ "$ALB_ARN" = "None" ]; then
            echo "ALB not found!"
            exit 1
          fi

          echo "ALB ARN: $ALB_ARN"
          echo "ALB DNS: $ALB_DNS"

          echo "alb_arn=$ALB_ARN" >> $GITHUB_OUTPUT
          echo "alb_dns=$ALB_DNS" >> $GITHUB_OUTPUT

      - name: Get Target Group
        id: tg
        run: |
          TG_ARN=$(aws elbv2 describe-target-groups --names adamguard-ssl-tg --query "TargetGroups[0].TargetGroupArn" --output text 2>/dev/null || echo "")

          if [ -z "$TG_ARN" ] || [ "$TG_ARN" = "None" ]; then
            VPC_ID=$(aws ec2 describe-vpcs --filters "Name=isDefault,Values=true" --query "Vpcs[0].VpcId" --output text)
            TG_ARN=$(aws elbv2 create-target-group \
              --name adamguard-ssl-tg \
              --protocol HTTP \
              --port 3000 \
              --vpc-id $VPC_ID \
              --target-type ip \
              --health-check-path "/" \
              --query "TargetGroups[0].TargetGroupArn" \
              --output text)
          fi

          echo "Target Group: $TG_ARN"
          echo "tg_arn=$TG_ARN" >> $GITHUB_OUTPUT

      - name: Configure HTTPS Listener
        if: steps.cert.outputs.cert_ready == 'true'
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"

          echo "=========================================="
          echo "🔧 CONFIGURING HTTPS LISTENER"
          echo "=========================================="

          HTTPS_LISTENER=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[?Port==\`443\`].ListenerArn" --output text 2>/dev/null || echo "")

          if [ -n "$HTTPS_LISTENER" ] && [ "$HTTPS_LISTENER" != "None" ]; then
            echo "HTTPS listener already exists: $HTTPS_LISTENER"
          else
            echo "Creating HTTPS listener on port 443..."

            aws elbv2 create-listener \
              --load-balancer-arn "$ALB_ARN" \
              --protocol HTTPS \
              --port 443 \
              --certificates CertificateArn="${{ env.SSL_CERT_ARN }}" \
              --default-actions Type=forward,TargetGroupArn="$TG_ARN"

            echo "✅ HTTPS listener created!"
          fi

      - name: Configure HTTP to HTTPS Redirect
        if: steps.cert.outputs.cert_ready == 'true'
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"

          echo "=========================================="
          echo "🔧 CONFIGURING HTTP TO HTTPS REDIRECT"
          echo "=========================================="

          HTTP_LISTENER=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[?Port==\`80\`].ListenerArn" --output text 2>/dev/null || echo "")

          if [ -n "$HTTP_LISTENER" ] && [ "$HTTP_LISTENER" != "None" ]; then
            echo "Found HTTP listener: $HTTP_LISTENER"

            aws elbv2 modify-listener \
              --listener-arn "$HTTP_LISTENER" \
              --default-actions Type=redirect,RedirectConfig="{Protocol=HTTPS,Port=443,StatusCode=HTTP_301}"

            echo "✅ Configured HTTP to HTTPS redirect!"
          else
            echo "Creating HTTP listener with redirect..."

            aws elbv2 create-listener \
              --load-balancer-arn "$ALB_ARN" \
              --protocol HTTP \
              --port 80 \
              --default-actions Type=redirect,RedirectConfig="{Protocol=HTTPS,Port=443,StatusCode=HTTP_301}"

            echo "✅ Created HTTP redirect listener!"
          fi

      - name: Register ECS Tasks
        run: |
          CLUSTER="adamguard-app"
          TG_ARN="${{ steps.tg.outputs.tg_arn }}"
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          CERT_READY="${{ steps.cert.outputs.cert_ready }}"

          echo "=========================================="
          echo "🔍 FINDING RUNNING TASKS"
          echo "=========================================="

          TASKS=$(aws ecs list-tasks --cluster $CLUSTER --desired-status RUNNING --query "taskArns[*]" --output text 2>/dev/null || echo "")

          if [ -z "$TASKS" ]; then
            echo "No running tasks found!"
            exit 1
          fi

          echo "Found tasks: $TASKS"

          if [ "$CERT_READY" != "true" ]; then
            echo ""
            echo "⚠️ Certificate not ready, ensuring HTTP listener forwards..."

            LISTENERS=$(aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[*].ListenerArn" --output text 2>/dev/null || echo "")
            for l in $LISTENERS; do
              [ -n "$l" ] && [ "$l" != "None" ] && aws elbv2 delete-listener --listener-arn "$l" && echo "Deleted listener: $l"
            done

            sleep 2

            aws elbv2 create-listener \
              --load-balancer-arn "$ALB_ARN" \
              --protocol HTTP \
              --port 80 \
              --default-actions Type=forward,TargetGroupArn="$TG_ARN"

            echo "HTTP listener created for forward"
          fi

          echo ""
          echo "=========================================="
          echo "📋 GETTING TASK IPs"
          echo "=========================================="

          TARGETS=""
          for task in $TASKS; do
            ENI=$(aws ecs describe-tasks --cluster $CLUSTER --tasks $task --query "tasks[0].attachments[0].details[?name=='networkInterfaceId'].value" --output text 2>/dev/null || echo "")

            if [ -n "$ENI" ] && [ "$ENI" != "None" ]; then
              PRIVATE_IP=$(aws ec2 describe-network-interfaces --network-interface-ids $ENI --query "NetworkInterfaces[0].PrivateIpAddress" --output text 2>/dev/null || echo "")

              if [ -n "$PRIVATE_IP" ] && [ "$PRIVATE_IP" != "None" ]; then
                echo "Task: $task -> IP: $PRIVATE_IP"
                if [ -z "$TARGETS" ]; then
                  TARGETS="Id=$PRIVATE_IP,Port=3000"
                else
                  TARGETS="$TARGETS Id=$PRIVATE_IP,Port=3000"
                fi
              fi
            fi
          done

          if [ -z "$TARGETS" ]; then
            echo "No task IPs found!"
            exit 1
          fi

          echo ""
          echo "=========================================="
          echo "📝 REGISTERING TARGETS"
          echo "=========================================="

          aws elbv2 register-targets --target-group-arn "$TG_ARN" --targets $TARGETS

          echo ""
          echo "Waiting 30 seconds for health checks..."
          sleep 30

          aws elbv2 describe-target-health --target-group-arn "$TG_ARN" --query "TargetHealthDescriptions[*].[Target.Id,TargetHealth.State]" --output table

      - name: Update Route 53
        run: |
          ALB_DNS="${{ steps.alb.outputs.alb_dns }}"
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"

          echo "=========================================="
          echo "🌐 UPDATING ROUTE 53"
          echo "=========================================="

          ZONE_ID=$(aws route53 list-hosted-zones --query "HostedZones[?contains(Name, 'deeptech-ai.co.uk')].Id" --output text | head -1)

          if [ -z "$ZONE_ID" ] || [ "$ZONE_ID" = "None" ]; then
            echo "No hosted zone found!"
            exit 1
          fi

          ZONE_ID=$(echo $ZONE_ID | sed 's|/hostedzone/||')
          echo "Zone ID: $ZONE_ID"

          ALB_ZONE_ID=$(aws elbv2 describe-load-balancers --load-balancer-arns "$ALB_ARN" --query "LoadBalancers[0].CanonicalHostedZoneId" --output text)

          cat > /tmp/route53.json << EOF
{
  "Comment": "Update adamguard DNS records",
  "Changes": [
    {
      "Action": "UPSERT",
      "ResourceRecordSet": {
        "Name": "adamguard.deeptech-ai.co.uk",
        "Type": "A",
        "AliasTarget": {
          "HostedZoneId": "$ALB_ZONE_ID",
          "DNSName": "dualstack.$ALB_DNS",
          "EvaluateTargetHealth": true
        }
      }
    },
    {
      "Action": "UPSERT",
      "ResourceRecordSet": {
        "Name": "adamguard.deeptech-ai.co.uk",
        "Type": "AAAA",
        "AliasTarget": {
          "HostedZoneId": "$ALB_ZONE_ID",
          "DNSName": "dualstack.$ALB_DNS",
          "EvaluateTargetHealth": true
        }
      }
    }
  ]
}
EOF

          aws route53 change-resource-record-sets --hosted-zone-id $ZONE_ID --change-batch file:///tmp/route53.json

          echo "✅ Route 53 updated!"

      - name: Verify Configuration
        run: |
          ALB_ARN="${{ steps.alb.outputs.alb_arn }}"
          CERT_READY="${{ steps.cert.outputs.cert_ready }}"

          echo "=========================================="
          echo "🔍 VERIFICATION"
          echo "=========================================="

          echo ""
          echo "=== ALB Listeners ==="
          aws elbv2 describe-listeners --load-balancer-arn "$ALB_ARN" --query "Listeners[*].[Port,Protocol,DefaultActions[0].Type]" --output table

          echo ""
          if [ "$CERT_READY" = "true" ]; then
            echo "=== Testing HTTPS ==="
            echo "Testing: https://adamguard.deeptech-ai.co.uk"
            curl -I "https://adamguard.deeptech-ai.co.uk" --max-time 10 2>&1 || echo "HTTPS test completed"

            echo ""
            echo "=== Testing HTTP Redirect ==="
            echo "Testing: http://adamguard.deeptech-ai.co.uk (should redirect to HTTPS)"
            curl -I "http://adamguard.deeptech-ai.co.uk" --max-time 10 2>&1 | head -10
          else
            echo "=== Testing HTTP ==="
            echo "Testing: http://adamguard.deeptech-ai.co.uk"
            curl -I "http://adamguard.deeptech-ai.co.uk" --max-time 10 2>&1 | head -15
          fi

          echo ""
          echo "=========================================="
          echo "📱 ACCESS URLS"
          echo "=========================================="
          echo ""
          if [ "$CERT_READY" = "true" ]; then
            echo "✅ HTTPS: https://adamguard.deeptech-ai.co.uk"
            echo "✅ HTTP:  http://adamguard.deeptech-ai.co.uk (redirects to HTTPS)"
          else
            echo "⏳ HTTPS: Pending certificate validation"
            echo "✅ HTTP:  http://adamguard.deeptech-ai.co.uk"
          fi
          echo ""
